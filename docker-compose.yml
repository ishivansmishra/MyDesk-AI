version: '3.9'
services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped

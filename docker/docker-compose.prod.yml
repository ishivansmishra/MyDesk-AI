version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: mydesk
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: mydesk
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://mydesk:changeme@db:5432/mydesk
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: "REPLACE_ME"
    ports:
      - '8000:8000'

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - '3000:3000'

volumes:
  db_data:
